<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Galau</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f0f0f, #1a001a);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* CARD */
.container {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  padding: 30px;
  border-radius: 20px;
  width: 90%;
  max-width: 400px;
  text-align: center;
  box-shadow: 0 0 30px rgba(255, 77, 109, 0.2);
}

/* TITLE */
h1 {
  margin-bottom: 10px;
  color: #ff4d6d;
}

/* NAMA */
.nama {
  font-size: 14px;
  opacity: 0.7;
  margin-bottom: 20px;
}

/* QUOTE */
.quote {
  font-size: 16px;
  min-height: 80px;
  margin: 20px 0;
}

/* BUTTON */
button {
  margin: 5px;
  padding: 10px 15px;
  border: none;
  border-radius: 15px;
  background: #ff4d6d;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

/* FOOTER */
.footer {
  margin-top: 15px;
  font-size: 12px;
  opacity: 0.5;
}
</style>
</head>

<body>

<div class="container">
  <h1>💔 Web Galau</h1>
  <div class="nama" id="nama"></div>

  <div class="quote" id="quote">Klik untuk mulai...</div>

  <button onclick="playMusic()">🎧 Musik</button>
  <button onclick="shareWA()">📲 Share</button>

  <div class="footer">made by Ahmad Shandi</div>

<audio id="musik" loop preload="auto">

function nextQuote() {
  document.getElementById("quote").innerText = quotes[i];
  i = (i + 1) % quotes.length;
}

// MUSIK
function playMusic() {
  let audio = document.getElementById("musik");
  audio.play().catch(() => {
    alert("Klik lagi biar musik jalan 🎧");
  });
}

  document.body.addEventListener("click", function() {
  let audio = document.getElementById("musik");
  audio.play();
}, { once: true });

// SHARE
function shareWA() {
  let text = document.getElementById("quote").innerText;
  let pesan = text + "\n\n💔 dari Ahmad Shandi";
  window.open("https://wa.me/?text=" + encodeURIComponent(pesan));
