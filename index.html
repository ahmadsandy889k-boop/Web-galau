<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Galau by Shandi</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Sacramento&family=Roboto&display=swap');

body {
  margin: 0;
  padding: 0;
  height: 100vh;
  font-family: 'Roboto', sans-serif;
  background: linear-gradient(to bottom, #0f2027, #203a43, #2c5364);
  color: #fff;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  text-align: center;
}

h1 {
  font-family: 'Sacramento', cursive;
  font-size: 3em;
}

textarea {
  width: 90%;
  max-width: 400px;
  height: 100px;
  padding: 10px;
  border-radius: 10px;
  border: none;
}

button {
  margin-top: 10px;
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
  background-color: #e74c3c;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

#quotes {
  margin-top: 20px;
  font-style: italic;
  white-space: pre-line;
  max-width: 400px;
}

footer {
  position: absolute;
  bottom: 10px;
  font-size: 14px;
  opacity: 0.7;
}

/* efek hujan */
.raindrop {
  position: absolute;
  width: 2px;
  height: 15px;
  background: rgba(255,255,255,0.3);
  animation: fall linear infinite;
}

@keyframes fall {
  from { transform: translateY(-20px); }
  to { transform: translateY(100vh); }
}
</style>
</head>

<body>

<h1>💔 Web Galau 💔</h1>

<textarea id="curhat" placeholder="Tulis curhatmu..."></textarea><br>

<button onclick="kirimCurhat()">Kirim Curhat</button>
<button onclick="shareWA()">Share ke WhatsApp</button>

<div id="quotes"></div>

<footer>
© 2026 Dibuat oleh Shandi
</footer>

function kirimCurhat() {
  let text = document.getElementById('curhat').value;

  if(text.trim() === "") {
    alert("Isi dulu curhatmu 😢");
    return;
  }

  let randomQuote = quotes[Math.floor(Math.random() * quotes.length)];

  lastText = text;
  lastQuote = randomQuote;

  document.getElementById('quotes').innerText =
    "💬 Curhat kamu:\n" + text +
    "\n\n💭 Quote:\n" + randomQuote;
}

function shareWA() {
  if(lastText === "") {
    alert("Isi curhat dulu 😢");
    return;
  }

  let message =
    "💔 Curhat dari Web Galau 💔\n\n" +
    "💬 " + lastText + "\n\n" +
    "💭 " + lastQuote + "\n\n" +
    "Dibuat oleh Shandi";

  let url = "https://wa.me/?text=" + encodeURIComponent(message);
  window.open(url, "_blank");
}

// hujan
function createRain() {
  for(let i=0;i<120;i++){
    let drop = document.createElement("div");
    drop.className = "raindrop";
    drop.style.left = Math.random()*window.innerWidth+"px";
    drop.style.animationDuration = (0.5+Math.random())+"s";
    document.body.appendChild(drop);
  }
}
